name: pipewire_video_capture
description: PipeWire screen capture to V4L2 loopback bridge for AFK Host.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.10.7
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      linux:
        pluginClass: PipewireVideoCapturePlugin
